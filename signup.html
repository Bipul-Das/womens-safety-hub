<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SafetyHub</title>

    <link rel="stylesheet" href="signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">SafetyHub</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="us.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="signup-container">
        <div class="signup-card">

            <div class="signup-header">
                <h2>Create Account</h2>
                <p>Join us to access safety resources & support.</p>
            </div>

            <form id="signup-form" class="professional-form">

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="signup-pass">Create Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signup-pass" placeholder="At least 6 characters" required>

                        <svg class="toggle-password" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-confirm-pass">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signup-confirm-pass" placeholder="Repeat your password" required>

                        <svg class="toggle-password" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy
                            Policy</a></label>
                </div>

                <div id="error-msg" class="error-message"></div>

                <button type="submit" class="btn-signup">Create Account</button>

                <p class="login-link">
                    Already have an account?
                    <a href="login.html">Log in</a>
                </p>
            </form>
        </div>
    </div>

    <script src="signup.js"></script>

</body>

</html>
